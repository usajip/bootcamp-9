<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple E-commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card {
            margin-bottom: 20px;
        }
        .product-image {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Simple E-commerce</h1>
        <div class="row mb-4">
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by product name">
            </div>
            <div class="col-md-4">
                <select id="categoryFilter" class="form-select">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Books">Books</option>
                    <option value="Home">Home</option>
                </select>
            </div>
            <div class="col-md-4">
                <input type="number" id="priceFilter" class="form-control" placeholder="Max Price">
            </div>
        </div>
        <div class="row" id="productContainer">
            <!-- Product cards will be inserted here by JavaScript -->
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const products = [
            { name: "Smartphone", price: 299, description: "Latest model smartphone", category: "Electronics", image: "https://via.placeholder.com/200" },
            { name: "Laptop", price: 799, description: "High performance laptop", category: "Electronics", image: "https://via.placeholder.com/200" },
            { name: "T-shirt", price: 19, description: "Comfortable cotton t-shirt", category: "Clothing", image: "https://via.placeholder.com/200" },
            { name: "Jeans", price: 49, description: "Stylish denim jeans", category: "Clothing", image: "https://via.placeholder.com/200" },
            { name: "Novel", price: 15, description: "Bestselling novel", category: "Books", image: "https://via.placeholder.com/200" },
            { name: "Cookbook", price: 25, description: "Delicious recipes cookbook", category: "Books", image: "https://via.placeholder.com/200" },
            { name: "Blender", price: 59, description: "High-speed blender for smoothies", category: "Home", image: "https://via.placeholder.com/200" },
            { name: "Vacuum Cleaner", price: 99, description: "Powerful vacuum cleaner for home use", category: "Home", image: "https://via.placeholder.com/200" },
            // Add more products to reach a total of 50
        ];

        function displayProducts(products) {
            const productContainer = document.getElementById('productContainer');
            productContainer.innerHTML = '';
            products.forEach(product => {
                const productCard = `
                    <div class="col-md-4 product-card">
                        <div class="card">
                            <img src="${product.image}" class="card-img-top product-image" alt="${product.name}">
                            <div class="card-body">
                                <h5 class="card-title">${product.name}</h5>
                                <p class="card-text">${product.description}</p>
                                <p class="card-text"><strong>Price:</strong> $${product.price}</p>
                                <p class="card-text"><strong>Category:</strong> ${product.category}</p>
                            </div>
                        </div>
                    </div>
                `;
                productContainer.innerHTML += productCard;
            });
        }
        displayProducts(products);
    </script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const priceFilter = document.getElementById('priceFilter');

        function filterProducts() {
            const searchValue = searchInput.value.toLowerCase();
            const selectedCategory = categoryFilter.value;
            const maxPrice = parseFloat(priceFilter.value);

            const filteredProducts = products.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchValue);
                const matchesCategory = selectedCategory === "" || product.category === selectedCategory;
                const matchesPrice = isNaN(maxPrice) || product.price <= maxPrice;

                return matchesSearch && matchesCategory && matchesPrice;
            });

            displayProducts(filteredProducts);
        }

        searchInput.addEventListener('input', filterProducts);
        categoryFilter.addEventListener('change', filterProducts);
        priceFilter.addEventListener('input', filterProducts);
    </script>
</body>
</html>
